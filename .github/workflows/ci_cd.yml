name: CI/CD – House Segmentation API

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt || true
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --ignore=scripts/ || true

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: house-seg:test
      
      - name: Smoke test
        run: |
          docker run -d -p 5000:5000 --name test-api house-seg:test
          sleep 5
          curl -f http://localhost:5000/health || true
          docker stop test-api
          docker rm test-api

  push-to-dockerhub:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/house-seg-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/house-seg-api:${{ github.sha }}

  deploy:
    needs: push-to-dockerhub
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env file
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" > .env
          echo "MODEL_PATH=models/unet_house_seg.pth" >> .env
      
      - name: Deploy with Docker Compose
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/house-seg-api:latest || true
          docker compose up -d
          sleep 5
          curl -f http://localhost:5000/health
