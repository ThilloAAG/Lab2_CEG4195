name: CI/CD – House Segmentation API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: thilloaag/house-segmentation
  PYTHON_VERSION: "3.9"

jobs:
  # ────────────────────────────────────────────────────────────
  # STAGE 1 – Lint & Unit Tests
  # ────────────────────────────────────────────────────────────
  test:
    name: "Stage 1 – Lint & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only torch to keep CI fast
          pip install torch==2.1.0 torchvision==0.16.0 \
              --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 app.py scripts/ tests/ \
            --max-line-length=110 \
            --ignore=E501,W503,E402

      - name: Run unit tests with coverage
        env:
          API_KEY:    ""
          MODEL_PATH: "models/unet_house_seg.pth"
          LOG_LEVEL:  "WARNING"
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────
  # STAGE 2 – Build & Smoke-Test Docker Image
  # ────────────────────────────────────────────────────────────
  build:
    name: "Stage 2 – Docker Build & Smoke Test"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max
          load: true

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke-test the container
        run: |
          docker run -d \
            --name smoke-test \
            -p 5000:5000 \
            -e API_KEY="" \
            -e MODEL_PATH="models/unet_house_seg.pth" \
            ${{ env.DOCKER_IMAGE }}:ci-${{ github.sha }}
          echo "Waiting for container to start…"
          sleep 15
          curl --retry 5 --retry-delay 3 -f http://localhost:5000/health
          echo ""
          echo "✅ Smoke test passed"
          docker stop smoke-test

  # ────────────────────────────────────────────────────────────
  # STAGE 3 – Push to Docker Hub  (main branch only)
  # ────────────────────────────────────────────────────────────
  push:
    name: "Stage 3 – Push to Docker Hub"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

  # ────────────────────────────────────────────────────────────
  # STAGE 4 – Deploy with Docker Compose  (main branch only)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: "Stage 4 – Deploy"
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject secrets into .env
        run: |
          cat > .env <<EOF
          API_KEY=${{ secrets.API_KEY }}
          SECRET_TOKEN=${{ secrets.SECRET_TOKEN }}
          MODEL_PATH=models/unet_house_seg.pth
          LOG_LEVEL=INFO
          MAX_IMAGE_SIZE=1024
          EOF
          echo ".env created (secrets injected from GitHub Secrets)"

      - name: Pull latest image & redeploy
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps

      - name: Wait and run health check
        run: |
          sleep 20
          curl --retry 5 --retry-delay 3 -f http://localhost:5000/health
          echo ""
          echo "✅ Deployment healthy"
